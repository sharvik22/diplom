---
name: Terraform CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ru-central1
  TF_STATE_KEY: main-infrastructure/terraform.tfstate
  TF_VERSION: "1.7.0"

jobs:
  terraform:
    name: Terraform Plan/Apply
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        run: |
          mkdir -p $HOME/.aws
          printf "[default]\naws_access_key_id=%s\naws_secret_access_key=%s\n" \
            "${{ secrets.YC_S3_ACCESS_KEY }}" \
            "${{ secrets.YC_S3_SECRET_KEY }}" > $HOME/.aws/credentials
          printf "[default]\nregion=%s\nendpoint_url=https://storage.yandexcloud.net\n" \
            "${{ env.AWS_REGION }}" > $HOME/.aws/config

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.YC_S3_BUCKET_NAME }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="endpoint=https://storage.yandexcloud.net" \
            -backend-config="skip_region_validation=true"

      - name: Check and import existing resources
        id: import
        continue-on-error: true  # Пропускаем ошибки, если ресурсы не существуют
        env:
          YC_TOKEN: ${{ secrets.YC_OAUTH }}
        run: |
          # Устанавливаем YC CLI
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i /usr/local -n
          yc config set token $YC_TOKEN
          yc config set cloud-id ${{ secrets.CLOUD_ID }}
          yc config set folder-id ${{ secrets.FOLDER_ID }}

          # Проверяем существование ВМ и импортируем их в state
          if yc compute instance get k8s-master &>/dev/null; then
            echo "Importing k8s-master..."
            terraform import yandex_compute_instance.k8s_master $(yc compute instance get k8s-master --format=json | jq -r .id)
          fi

          if yc compute instance get k8s-worker-1 &>/dev/null; then
            echo "Importing k8s-worker[0]..."
            terraform import yandex_compute_instance.k8s_worker[0] $(yc compute instance get k8s-worker-1 --format=json | jq -r .id)
          fi

          if yc compute instance get k8s-worker-2 &>/dev/null; then
            echo "Importing k8s-worker[1]..."
            terraform import yandex_compute_instance.k8s_worker[1] $(yc compute instance get k8s-worker-2 --format=json | jq -r .id)
          fi

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        env:
          TF_VAR_yc_token: ${{ secrets.YC_OAUTH }}
          TF_VAR_cloud_id: ${{ secrets.CLOUD_ID }}
          TF_VAR_folder_id: ${{ secrets.FOLDER_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_service_account_id: ${{ secrets.SERVICE_ACCOUNT_ID }}
          TF_VAR_k8s_security_group_id: ${{ secrets.K8S_SG_ID }}
        run: terraform plan -input=false

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        continue-on-error: true  # Продолжаем даже при ошибках (например, если ресурсы уже существуют)
        env:
          TF_VAR_yc_token: ${{ secrets.YC_OAUTH }}
          TF_VAR_cloud_id: ${{ secrets.CLOUD_ID }}
          TF_VAR_folder_id: ${{ secrets.FOLDER_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_service_account_id: ${{ secrets.SERVICE_ACCOUNT_ID }}
          TF_VAR_k8s_security_group_id: ${{ secrets.K8S_SG_ID }}
        run: |
          terraform apply -auto-approve -input=false || echo "Apply completed with errors (possibly resources already exist)"
